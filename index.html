<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TruthLens" />
    <meta name="application-name" content="TruthLens AI" />
    <meta name="theme-color" content="#3b82f6" />
    
    <!-- Essential SEO Meta Tags -->
    <title>TruthLens AI - Verify News, Videos & Claims Instantly with AI</title>
    <meta name="description" content="AI-powered fact-checking platform that verifies news headlines, videos, images, and claims in real-time. Get instant truth scores backed by global trusted sources." />
    <meta name="keywords" content="fact check, news verification, AI fact checker, fake news detector, claim verification, truth score, misinformation detection" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://truthlens.ai" />
    <meta property="og:title" content="TruthLens AI - Verify News, Videos & Claims Instantly with AI" />
    <meta property="og:description" content="AI-powered fact-checking platform that verifies news headlines, videos, images, and claims in real-time. Get instant truth scores backed by global trusted sources." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=1200&h=630&fit=crop" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="TruthLens AI" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://truthlens.ai" />
    <meta name="twitter:title" content="TruthLens AI - Verify News, Videos & Claims Instantly with AI" />
    <meta name="twitter:description" content="AI-powered fact-checking platform that verifies news headlines, videos, images, and claims in real-time. Get instant truth scores backed by global trusted sources." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=1200&h=630&fit=crop" />
    
    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TruthLens AI",
      "url": "https://truthlens.ai",
      "description": "AI-powered fact-checking platform that verifies news headlines, videos, images, and claims in real-time.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://truthlens.ai/verify?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
